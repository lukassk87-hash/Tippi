<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tippi – Highscores</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="highscorePage" style="max-width:820px;margin:18px auto;padding:12px;color:#eee;">
    <h1>Highscores</h1>

    <div id="highscoreList" style="font-size:16px;line-height:1.5;"></div>

    <div style="margin-top:18px;">
      <button class="menuBtn" onclick="location.href='index.html'">Zurück zum Menü</button>
    </div>
  </div>

  <!-- Highscore Engine -->
  <script src="www/js/highscore.js"></script>

  <!-- Highscore Rendering -->
  <script>
    // Sobald die Seite geladen ist → Highscores anzeigen
    document.addEventListener("DOMContentLoaded", () => {
      if (typeof renderHighscoreList === "function") {
        renderHighscoreList();
      }
    });
  </script>
</body>
</html>
