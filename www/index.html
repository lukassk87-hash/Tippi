<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Merkspiel – Auto-Shrink Random Icons + Highscore + GameOver Overlay + Preload</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      touch-action: manipulation;
      font-family: system-ui, sans-serif;
    }

    .icon {
      position: absolute;
      display: none;
      z-index: 5;
      image-rendering: auto;
    }

    .hitbox-debug {
      position: absolute;
      border-radius: 50%;
      background: rgba(200,200,200,0.25);
      pointer-events: none;
      display: none;
      z-index: 3;
    }

    #info {
      position: fixed;
      top: 40px;
      left: 10px;
      color: white;
      font-size: 18px;
      z-index: 10;
    }

    #countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 60px;
      font-weight: bold;
      display: none;
      z-index: 20;
    }

    #nextRoundBtn {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: white;
      display: none;
      cursor: pointer;
      z-index: 30;
    }

    #highscoreBox {
      position: fixed;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 20px;
      text-align: center;
      display: none;
      z-index: 40;
    }

    #gameOverOverlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: white;
      display: none;
      z-index: 100;
    }

    #gameOverOverlay h1 {
      font-size: 60px;
      margin: 0;
      padding: 0;
    }

    #gameOverOverlay img {
      width: 180px;
      height: 180px;
      margin-top: 25px;
      border-radius: 10px;
    }

    #restartBtn {
      margin-top: 25px;
      padding: 15px 25px;
      font-size: 22px;
      border: none;
      border-radius: 8px;
      background: #dc3545;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="info">Fehler: 0 / 3 – Runde 1</div>
<div id="countdown"></div>
<button id="nextRoundBtn">Start</button>

<div id="highscoreBox"></div>

<div id="gameOverOverlay">
  <h1>Game Over</h1>
  <img src="resources/miss.jpg" alt="Miss">
  <br>
  <button id="restartBtn">Neustart</button>
</div>

<script>
  const DEBUG = false;

  const IMG_START = "resources/start.jpg";
  const IMG_HIT   = "resources/hit.jpg";
  const IMG_MISS  = "resources/miss.jpg";

  const SAFE_TOP = 75;
  const SAFE_BOTTOM = 75;

  const MAX_ICON_SIZE = 75;
  const MIN_ICON_SIZE = 20;

  const info = document.getElementById("info");
  const countdown = document.getElementById("countdown");
  const nextBtn = document.getElementById("nextRoundBtn");
  const highscoreBox = document.getElementById("highscoreBox");
  const gameOverOverlay = document.getElementById("gameOverOverlay");
  const restartBtn = document.getElementById("restartBtn");

  let mistakes = 0;
  let round = 1;
  let gameActive = true;

  let positions = [];
  let icons = [];
  let hitboxes = [];
  let remaining = 0;
  let tapEnabled = false;

  let ICON_SIZE = MAX_ICON_SIZE;
  let HIT_RADIUS = ICON_SIZE * 0.6;

  // ⭐ NEU: Fehler dürfen nur gezählt werden, wenn das Spiel läuft
  let mistakesEnabled = false;

  // PRELOAD
  const preloadImages = [IMG_START, IMG_HIT, IMG_MISS];
  preloadImages.forEach(src => { const img = new Image(); img.src = src; });

  // HIGHSCORE SYSTEM
  function loadHighscores() {
    const data = localStorage.getItem("highscores");
    return data ? JSON.parse(data) : [];
  }

  function saveHighscores(list) {
    localStorage.setItem("highscores", JSON.stringify(list));
  }

  function addHighscore(name, score) {
    let list = loadHighscores();
    list.push({ name, score });
    list.sort((a, b) => b.score - a.score);
    list = list.slice(0, 3);
    saveHighscores(list);
  }

  function showHighscores() {
    const list = loadHighscores();
    if (list.length === 0) {
      highscoreBox.innerHTML = "<b>Keine Highscores vorhanden</b>";
    } else {
      highscoreBox.innerHTML =
        "<b>Top 3 Highscores</b><br><br>" +
        list.map((e, i) => `${i+1}. ${e.name}: ${e.score}`).join("<br>");
    }
    highscoreBox.style.display = "block";
  }

  function checkForHighscore(score) {
    const list = loadHighscores();
    if (list.length < 3) return true;
    return score > list[list.length - 1].score;
  }

  nextBtn.addEventListener("click", () => {
    mistakesEnabled = false; // ⭐ Startphase → Fehler aus
    highscoreBox.style.display = "none";
    nextBtn.style.display = "none";
    spawnIcons();
  });

  function tryPlaceIcons(count) {
    const screenW = window.innerWidth;
    const screenH = window.innerHeight;

    const newPositions = [];

    for (let i = 0; i < count; i++) {
      let attempts = 0;
      let placed = false;

      while (!placed && attempts < 200) {
        attempts++;

        const cx = Math.random() * (screenW - ICON_SIZE) + ICON_SIZE / 2;
        const cy = Math.random() * (screenH - SAFE_TOP - SAFE_BOTTOM - ICON_SIZE)
                   + SAFE_TOP + ICON_SIZE / 2;

        let ok = true;

        for (const p of newPositions) {
          const dx = cx - p.x;
          const dy = cy - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < HIT_RADIUS * 2) {
            ok = false;
            break;
          }
        }

        if (ok) {
          newPositions.push({ x: cx, y: cy, hit: false });
          placed = true;
        }
      }

      if (!placed) return null;
    }

    return newPositions;
  }

  function spawnIcons() {
    let count = round;

    ICON_SIZE = MAX_ICON_SIZE;
    HIT_RADIUS = ICON_SIZE * 0.6;

    let placed = null;

    while (!placed) {
      placed = tryPlaceIcons(count);

      if (!placed) {
        ICON_SIZE *= 0.9;
        ICON_SIZE = Math.max(ICON_SIZE, MIN_ICON_SIZE);
        HIT_RADIUS = ICON_SIZE * 0.6;

        if (ICON_SIZE === MIN_ICON_SIZE) {
          placed = tryPlaceIcons(count);
          if (!placed) {
            alert("Zu viele Icons – Runde kann nicht dargestellt werden.");
            return;
          }
        }
      }
    }

    positions = placed;

    icons = [];
    hitboxes = [];
    tapEnabled = false;
    remaining = round;

    for (const pos of positions) {
      const icon = document.createElement("img");
      icon.src = IMG_START;
      icon.className = "icon";
      icon.style.left = (pos.x - ICON_SIZE / 2) + "px";
      icon.style.top = (pos.y - ICON_SIZE / 2) + "px";
      icon.style.width = ICON_SIZE + "px";
      icon.style.height = ICON_SIZE + "px";
      document.body.appendChild(icon);
      icons.push(icon);

      const hb = document.createElement("div");
      hb.className = "hitbox-debug";
      hb.style.width = (HIT_RADIUS * 2) + "px";
      hb.style.height = (HIT_RADIUS * 2) + "px";
      hb.style.left = (pos.x - HIT_RADIUS) + "px";
      hb.style.top = (pos.y - HIT_RADIUS) + "px";
      if (DEBUG) hb.style.display = "block";
      document.body.appendChild(hb);
      hitboxes.push(hb);
    }

    showIconsWithCountdown();
  }

  async function showIconsWithCountdown() {
    countdown.style.display = "block";

    let timeLeft = 3;
    countdown.textContent = timeLeft;

    const interval = setInterval(() => {
      timeLeft--;
      countdown.textContent = timeLeft;
      if (timeLeft <= 0) clearInterval(interval);
    }, 1000);

    icons.forEach(icon => icon.style.display = "block");

    await wait(3000);

    icons.forEach(icon => icon.style.display = "none");

    countdown.style.display = "none";

    tapEnabled = true;
    mistakesEnabled = true; // ⭐ Jetzt erst dürfen Fehler gezählt werden
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function handleTap(event) {

    if (!gameActive || !tapEnabled) return;

    const tapX = event.clientX;
    const tapY = event.clientY;

    let hitSomething = false;

    for (let i = 0; i < positions.length; i++) {
      if (positions[i].hit) continue;

      const dx = tapX - positions[i].x;
      const dy = tapY - positions[i].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < HIT_RADIUS) {
        positions[i].hit = true;
        hitSomething = true;
        remaining--;

        const icon = icons[i];
        icon.src = IMG_HIT;
        icon.style.display = "block";

        setTimeout(() => {
          icon.style.display = "none";
          icon.src = IMG_START;
        }, 300);

        if (remaining === 0) {
          tapEnabled = false;
          mistakesEnabled = false; // ⭐ Runde vorbei → Fehler aus

          setTimeout(() => {
            round++;
            info.textContent = `Fehler: ${mistakes} / 3 – Runde ${round}`;

            nextBtn.textContent = round === 1 ? "Start" : "Nächste Runde";
            clearIcons();
            nextBtn.style.display = "block";
          }, 500);
        }

        break;
      }
    }

    if (!hitSomething) {

      // ⭐ Fehler nur zählen, wenn erlaubt
      if (!mistakesEnabled) return;

      mistakes++;
      info.textContent = `Fehler: ${mistakes} / 3 – Runde ${round}`;
      flashRed();

      if (mistakes >= 3) {
        gameActive = false;
        mistakesEnabled = false; // ⭐ Game Over → Fehler aus

        const score = round - 1;

        if (checkForHighscore(score)) {
          const name = prompt(`Neuer Highscore! Runde ${score}. Dein Name:`);
          if (name) addHighscore(name, score);
        }

        showHighscores();

        gameOverOverlay.style.display = "block";
      }
    }
  }

  function flashRed() {
    for (let i = 0; i < positions.length; i++) {
      if (!positions[i].hit) {
        icons[i].src = IMG_MISS;
        icons[i].style.display = "block";
      }
    }

    setTimeout(() => {
      for (let i = 0; i < positions.length; i++) {
        if (!positions[i].hit) {
          icons[i].style.display = "none";
          icons[i].src = IMG_START;
        }
      }
    }, 200);
  }

  function clearIcons() {
    icons.forEach(el => el.remove());
    hitboxes.forEach(el => el.remove());
  }

  function restartGame() {
    mistakes = 0;
    round = 1;
    gameActive = true;
    mistakesEnabled = false; // ⭐ Neustart → Fehler aus

    info.textContent = "Fehler: 0 / 3 – Runde 1";
    clearIcons();
    highscoreBox.style.display = "none";
    gameOverOverlay.style.display = "none";
    nextBtn.textContent = "Start";
    nextBtn.style.display = "block";
  }

  restartBtn.addEventListener("click", restartGame);

  document.addEventListener("click", (e) => {
    if (!gameActive && mistakes >= 3) {
      restartGame();
    } else {
      handleTap(e);
    }
  });

  nextBtn.style.display = "block";
</script>

</body>
</html>
