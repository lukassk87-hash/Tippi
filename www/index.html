<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Merkspiel – Bild-Icons</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      touch-action: manipulation;
      font-family: system-ui, sans-serif;
    }

    .icon {
      position: absolute;
      width: 25px;
      height: 25px;
      display: none;
      z-index: 5;
      image-rendering: auto;
    }

    .hitbox-debug {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(200,200,200,0.25);
      pointer-events: none;
      display: none;
      z-index: 3;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      font-size: 18px;
      z-index: 10;
    }

    #countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 60px;
      font-weight: bold;
      display: none;
      z-index: 20;
    }

    #nextRoundBtn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      font-size: 20px;
      border: none;
      border-radius: 8px;
      background: #28a745;
      color: white;
      display: none;
      cursor: pointer;
      z-index: 30;
    }
  </style>
</head>
<body>

<div id="info">Fehler: 0 / 3 – Runde 1</div>
<div id="countdown"></div>
<button id="nextRoundBtn">Nächste Runde starten</button>

<script>
  const DEBUG = true;

  const IMG_START = "resources/start.jpg";
  const IMG_HIT   = "resources/hit.jpg";
  const IMG_MISS  = "resources/miss.jpg";

  const info = document.getElementById("info");
  const countdown = document.getElementById("countdown");
  const nextBtn = document.getElementById("nextRoundBtn");

  let mistakes = 0;
  let round = 1;
  let gameActive = true;

  let positions = [];
  let icons = [];
  let hitboxes = [];
  let remaining = 0;
  let tapEnabled = false;

  const ICON_SIZE = 25;
  const HIT_RADIUS = 75;
  const MIN_DISTANCE = HIT_RADIUS * 2;

  nextBtn.addEventListener("click", () => {
    nextBtn.style.display = "none";
    spawnIcons();
  });

  function spawnIcons() {
    positions = [];
    icons = [];
    hitboxes = [];
    tapEnabled = false;
    remaining = round;

    const screenW = window.innerWidth;
    const screenH = window.innerHeight;

    for (let i = 0; i < round; i++) {
      let cx, cy;
      let valid = false;

      while (!valid) {
        cx = Math.random() * (screenW - ICON_SIZE) + ICON_SIZE / 2;
        cy = Math.random() * (screenH - ICON_SIZE) + ICON_SIZE / 2;

        valid = true;

        for (const p of positions) {
          const dx = cx - p.x;
          const dy = cy - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < MIN_DISTANCE) {
            valid = false;
            break;
          }
        }
      }

      positions.push({ x: cx, y: cy, hit: false });

      const icon = document.createElement("img");
      icon.src = IMG_START;
      icon.className = "icon";
      icon.style.left = (cx - ICON_SIZE / 2) + "px";
      icon.style.top = (cy - ICON_SIZE / 2) + "px";
      icon.style.width = ICON_SIZE + "px";
      icon.style.height = ICON_SIZE + "px";
      document.body.appendChild(icon);
      icons.push(icon);

      const hb = document.createElement("div");
      hb.className = "hitbox-debug";
      hb.style.left = (cx - HIT_RADIUS) + "px";
      hb.style.top = (cy - HIT_RADIUS) + "px";
      if (DEBUG) hb.style.display = "block";
      document.body.appendChild(hb);
      hitboxes.push(hb);
    }

    showIconsWithCountdown();
  }

  async function showIconsWithCountdown() {
    countdown.style.display = "block";

    let timeLeft = 3;
    countdown.textContent = timeLeft;

    const interval = setInterval(() => {
      timeLeft--;
      countdown.textContent = timeLeft;
      if (timeLeft <= 0) clearInterval(interval);
    }, 1000);

    icons.forEach(icon => icon.style.display = "block");

    await wait(3000);

    icons.forEach(icon => icon.style.display = "none");

    countdown.style.display = "none";

    tapEnabled = true;
  }

  function wait(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function handleTap(event) {
    if (!gameActive || !tapEnabled) return;

    const tapX = event.clientX;
    const tapY = event.clientY;

    let hitSomething = false;

    for (let i = 0; i < positions.length; i++) {
      if (positions[i].hit) continue;

      const dx = tapX - positions[i].x;
      const dy = tapY - positions[i].y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < HIT_RADIUS) {
        positions[i].hit = true;
        hitSomething = true;
        remaining--;

        const icon = icons[i];
        icon.src = IMG_HIT;
        icon.style.display = "block";

        setTimeout(() => {
          icon.style.display = "none";
          icon.src = IMG_START;
        }, 300);

        if (remaining === 0) {
          tapEnabled = false;

          setTimeout(() => {
            round++;
            info.textContent = `Fehler: ${mistakes} / 3 – Runde ${round}`;
            clearIcons();
            nextBtn.style.display = "block";
          }, 500);
        }

        break;
      }
    }

    if (!hitSomething) {
      mistakes++;
      info.textContent = `Fehler: ${mistakes} / 3 – Runde ${round}`;
      flashRed();

      if (mistakes >= 3) {
        gameActive = false;
        info.textContent = "Game Over – tippe zum Neustart";
      }
    }
  }

  function flashRed() {
    for (let i = 0; i < positions.length; i++) {
      if (!positions[i].hit) {
        icons[i].src = IMG_MISS;
        icons[i].style.display = "block";
      }
    }

    setTimeout(() => {
      for (let i = 0; i < positions.length; i++) {
        if (!positions[i].hit) {
          icons[i].style.display = "none";
          icons[i].src = IMG_START;
        }
      }
    }, 200);
  }

  function clearIcons() {
    icons.forEach(el => el.remove());
    hitboxes.forEach(el => el.remove());
  }

  function restartGame() {
    mistakes = 0;
    round = 1;
    gameActive = true;
    info.textContent = "Fehler: 0 / 3 – Runde 1";
    clearIcons();
    nextBtn.style.display = "block";
  }

  document.addEventListener("click", (e) => {
    if (!gameActive && mistakes >= 3) {
      restartGame();
    } else {
      handleTap(e);
    }
  });

  nextBtn.style.display = "block";
</script>

</body>
</html>
