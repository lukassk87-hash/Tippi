<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tippi – Spiel</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="game-active">

  <div id="info">Fehler: 0 / 3 – Runde 1</div>
  <div id="countdown"></div>

  <div id="hintText">
    Merke dir das Gesicht, sonst triffst du es wohl nicht.<br>
    Merke dir die Position und tippe auf das versteckte Gesicht um zu gewinnen.
  </div>

  <button id="nextRoundBtn">Start</button>

  <div id="gameOverContainer">
    <div id="gameOverOverlay">
      <h1>Game Over</h1>
      <img src="/resources/miss.jpg" alt="Miss"></br>
      <button id="restartBtn">Neustart</button>
    </div>

    <div id="highscoreBox"></div>
  </div>

  <script src="js/highscore.js"></script>
  <script src="js/game.js"></script>

</body>
</html>
