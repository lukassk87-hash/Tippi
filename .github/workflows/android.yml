name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean workspace
        run: |
          rm -rf android
          rm -rf node_modules
          rm -rf package-lock.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Optimize images
        run: npm run optimize-images

      - name: Install Capacitor Android
        run: npm install @capacitor/android

      - name: Install Capacitor Assets
        run: npm install --save-dev @capacitor/assets

      # Web-Build (bei dir nur ein Platzhalter)
      - name: Build Web App
        run: npm run build

      # Add Android platform
      - name: Add Android platform
        run: npx cap add android

      # Generate icons
      - name: Generate Android Icons
        run: npx capacitor-assets generate --android

      # Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set ANDROID_HOME
        run: echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: Clear Gradle cache (optional)
        run: |
          if [ -d "$HOME/.gradle/caches" ]; then
            echo "Removing Gradle caches..."
            rm -rf "$HOME/.gradle/caches"
          else
            echo "No Gradle cache found."
          fi

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tippi.apk
          path: android/app/build/outputs/apk/debug/*.apk